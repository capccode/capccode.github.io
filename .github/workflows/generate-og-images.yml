name: Generate OG Images

on:
  push:
    branches: [main]
    paths:
      - 'assets/og/generate.mjs'
      - 'assets/og/template.html'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install puppeteer
        run: npm install puppeteer
        working-directory: assets/og

      - name: Generate OG images
        run: node generate.mjs
        working-directory: assets/og

      - name: Commit and push if changed
        run: |
          git config user.name "capccode"
          git config user.email "capccode@users.noreply.github.com"
          git add assets/og/*.png
          git diff --staged --quiet || (git commit -m "Update OG images [automated]" && git pull --rebase && git push)
